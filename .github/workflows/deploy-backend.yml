name: Deploy Backend

# Own manual button in the Actions tab, and reusable so deploy-all.yml can
# call it too. No dependency on the other two services - FRONTEND_URL below
# is a hardcoded Cloud Run URL (stable across redeploys of bcs-frontend),
# not something that has to be deployed first.
on:
  workflow_dispatch: {}
  workflow_call: {}

env:
  REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev/sameerv/bcs-tracker
  FRONTEND_URL: https://bcs-frontend-1081873675658.us-central1.run.app

permissions:
  contents: read
  id-token: write # required for Workload Identity Federation

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2

      - run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        working-directory: backend
        run: |
          docker build -t ${{ env.REGISTRY }}/backend:${{ github.sha }} .
          docker push ${{ env.REGISTRY }}/backend:${{ github.sha }}

      - uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: bcs-backend
          region: ${{ env.REGION }}
          image: ${{ env.REGISTRY }}/backend:${{ github.sha }}
          # min-instances=1: keeps one instance's MongoDB connection pool
          # permanently warm. At min-instances=0 the container (and its
          # connection pool) gets torn down between bursts of traffic, so
          # the first query on a fresh instance pays a ~1s "cold connect"
          # tax (SRV DNS + TLS handshake to the Atlas cluster) that a warm
          # pool never pays - measured directly against the cluster: ~400ms
          # connect + ~190ms first-query overhead, vs ~20ms once warm.
          flags: --allow-unauthenticated --port=8080 --memory=512Mi --min-instances=1 --max-instances=3 --service-account=bcs-backend-uploader@sameerv.iam.gserviceaccount.com
          env_vars: |
            SMTP_HOST=email-smtp.ap-south-1.amazonaws.com
            SMTP_PORT=587
            SMTP_SECURE=false
            MAIL_FROM=bcstracker@thirdrocktechkno.com
            GCS_BUCKET_NAME=sameerv-cow-bcs-images
            GCS_PROJECT_ID=sameerv
            GCS_SIGNED_URL_EXPIRY_MS=900000
            FRONTEND_URL=${{ env.FRONTEND_URL }}
          secrets: |
            MONGODB_URL=bcs-mongodb-url:latest
            JWT_ACCESS_SECRET=bcs-jwt-access-secret:latest
            SMTP_USER=bcs-smtp-user:latest
            SMTP_PASSWORD=bcs-smtp-password:latest

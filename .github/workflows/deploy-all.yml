name: Deploy All (Cloud Run)

# Auto-deploys on every push to main, but only the service(s) whose files
# actually changed. The manual "Run workflow" button skips that check and
# always deploys all three - the "deploy everything" option.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

# The reusable workflows this file calls each request id-token: write (for
# WIF). A caller can only delegate permissions it actually holds, and with
# no permissions: block here this workflow got whatever the repo's default
# is - which apparently doesn't include id-token: write, so every call was
# rejected before any job ran (0 jobs, startup_failure, no error text
# anywhere - the standalone workflows ran fine on their own since they each
# declare this same block directly).
permissions:
  contents: read
  id-token: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      ai-backend: ${{ steps.filter.outputs.ai-backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            ai-backend:
              - 'ai-backend/**'
            frontend:
              - 'frontend/**'

  deploy-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/deploy-backend.yml
    secrets: inherit

  deploy-ai-backend:
    needs: changes
    if: needs.changes.outputs.ai-backend == 'true' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/deploy-ai-backend.yml
    secrets: inherit

  deploy-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/deploy-frontend.yml
    secrets: inherit
